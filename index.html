<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#2d5016">
  <title>里山 植物調査</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>里山 植物調査</h1>
      <p class="subtitle">撮影・位置・名前を記録</p>
    </header>

    <main class="main">
      <!-- 新規記録フォーム -->
      <section class="card record-form" id="recordForm">
        <h2>新しい記録</h2>

        <div class="photo-area">
          <input type="file" id="photoInput" accept="image/*" capture="environment" aria-label="植物の写真を撮影">
          <label class="photo-preview" id="photoPreview" for="photoInput">
            <span class="photo-placeholder">タップして写真を撮影</span>
            <img id="previewImg" alt="" hidden>
          </label>
          <button type="button" class="btn btn-secondary" id="clearPhotoBtn" hidden>写真を消す</button>
        </div>

        <div class="field">
          <label for="plantName">植物名</label>
          <input type="text" id="plantName" placeholder="例: ススキ、クズ" autocomplete="off">
        </div>

        <div class="field">
          <label for="notes">メモ（任意）</label>
          <textarea id="notes" rows="2" placeholder="生育状況、量、高さなど"></textarea>
        </div>

        <div class="field location-field">
          <label>位置</label>
          <div class="location-status" id="locationStatus">取得していません</div>
          <button type="button" class="btn btn-secondary" id="getLocationBtn">現在地を取得</button>
          <input type="hidden" id="latitude">
          <input type="hidden" id="longitude">
        </div>

        <button type="button" class="btn btn-primary" id="saveBtn" disabled>記録を保存</button>
      </section>

      <!-- 記録一覧 -->
      <section class="card records-list">
        <div class="list-header">
          <h2>記録一覧</h2>
          <div class="list-actions">
            <button type="button" class="btn btn-small" id="exportBtn">JSONでエクスポート</button>
          </div>
        </div>
        <ul class="records" id="recordsList"></ul>
        <p class="empty-message" id="emptyMessage">まだ記録がありません。上で写真を撮って記録を追加してください。</p>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
